services:
  postgres:
    image: postgres:16
    container_name: stenaskartinami-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stenaskartinami
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-v5:
    build:
      context: ./api-v5
      dockerfile: dockerfile
    container_name: stenaskartinami-api-v5
    restart: unless-stopped
    env_file:
      - ./api-v5/.env
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api-v5/public/uploads:/usr/src/app/public/uploads

  front:
    build:
      context: ./front
      dockerfile: dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.stenaskartinami.com/api
        NEXT_PUBLIC_TELEGRAM_BOT_NAME: stenaskartinami_bot
        NEXT_PUBLIC_SMS_ENABLED: "false"
        NEXT_PUBLIC_MEILISEARCH_HOST: https://meili.stenaskartinami.com
        NEXT_PUBLIC_MEILISEARCH_KEY: ""
    container_name: stenaskartinami-front
    restart: unless-stopped
    env_file:
      - ./front/.env
    environment:
      - STRAPI_SERVER_URL=http://api-v5:1337/api
      # Reach the host's native Meilisearch from inside the container
      - MEILISEARCH_INTERNAL_HOST=http://host.docker.internal:7700
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    depends_on:
      - api-v5

volumes:
  postgres_data:
